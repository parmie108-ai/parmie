<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的藝術探險與導覽奇幻基地</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col pb-12">

    <header class="bg-gradient-to-r from-violet-500 via-purple-500 to-indigo-600 text-white shadow-lg py-8 px-4 text-center relative">
        <span class="bg-amber-400 text-amber-950 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wider inline-block shadow-sm">
            我的藝術探險紀錄
        </span>
        <h1 class="text-3xl md:text-4xl font-extrabold mt-3 tracking-tight">我的藝術探險與導覽奇幻基地</h1>
        <p class="text-sm md:text-base text-purple-100 mt-2 max-w-2xl mx-auto">
            在這裡，你可以療癒心靈、修練美術技巧，還能模擬練習導覽課，成為最閃亮的小小導覽大師！
        </p>
    </header>

    <nav class="flex justify-center bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm overflow-x-auto">
        <button onclick="switchTab('healing')" id="tab-healing" class="px-5 py-4 font-bold text-sm flex items-center gap-2 whitespace-nowrap border-b-4 border-violet-600 text-violet-600">
            1. 心靈療癒室
        </button>
        <button onclick="switchTab('skills')" id="tab-skills" class="px-5 py-4 font-bold text-sm flex items-center gap-2 whitespace-nowrap text-slate-500 hover:text-slate-800">
            2. 藝術技能場
        </button>
    </nav>

    <main class="max-w-5xl mx-auto px-4 mt-8 w-full flex-grow">
        
        <div id="content-healing" class="grid md:grid-cols-2 gap-8 animate-fadeIn">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                <h2 class="text-xl font-bold text-violet-700 mb-2">🎨 我的「心情顏色日記」</h2>
                <p class="text-xs text-slate-500 mb-4">選取一個心情，在畫布上自由塗鴉，把煩惱釋放在紙上吧！</p>
                <div class="flex gap-4 items-center mb-3">
                    <input type="color" id="brushColor" value="#FBBF24" class="w-8 h-8 rounded cursor-pointer">
                    <input type="range" id="brushSize" min="2" max="20" value="8" class="w-full accent-violet-600">
                </div>
                <div class="border-2 border-dashed border-slate-200 rounded-xl overflow-hidden bg-slate-50 relative">
                    <canvas id="healingCanvas" width="340" height="240" class="w-full h-[240px] cursor-crosshair touch-none bg-white"></canvas>
                    <button onclick="clearCanvas()" class="absolute bottom-2 right-2 bg-white/90 text-slate-700 text-xs px-2.5 py-1.5 rounded-lg border shadow-sm font-semibold">清除畫布</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold text-emerald-700 mb-2">🧘‍♀️ 藝術冥想與深呼吸</h2>
                    <p class="text-xs text-slate-500 mb-6">跟隨呼吸球進行調節，放鬆沉重的課業壓力。</p>
                    <div class="flex flex-col items-center justify-center py-8">
                        <div id="breathBall" class="w-24 h-24 rounded-full bg-gradient-to-tr from-emerald-400 to-teal-500 flex items-center justify-center text-white font-bold text-sm shadow-lg transition-all duration-1000 ease-in-out">
                            準備中
                        </div>
                        <p id="breathText" class="mt-8 font-semibold text-emerald-800 text-sm">點擊下方按鈕開始練習</p>
                    </div>
                </div>
                <button onclick="toggleBreath()" id="breathBtn" class="w-full py-3 px-4 rounded-xl font-bold text-sm bg-emerald-600 hover:bg-emerald-700 text-white shadow-md">🎵 開始深呼吸放鬆</button>
            </div>
        </div>

        <div id="content-skills" class="hidden grid md:grid-cols-2 gap-8 animate-fadeIn">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                <h2 class="text-xl font-bold text-purple-700 mb-2">🌗 3D立體球光影模擬器</h2>
                <p class="text-xs text-slate-500 mb-4">拖拉下方拉桿改變太陽位置，觀察球體的亮面與投影變化！</p>
                <div class="border border-slate-100 rounded-xl bg-slate-50 flex justify-center py-4 relative">
                    <canvas id="sphereCanvas" width="300" height="240" class="bg-white rounded-lg shadow-sm"></canvas>
                </div>
                <div class="mt-4 space-y-3">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1">💡 左右光源位置 (X軸)</label>
                        <input type="range" id="lightX" min="30" max="270" value="180" class="w-full accent-purple-600" oninput="drawSphere()">
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 flex flex-col justify-between">
                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">複合媒材層次搭配</span>
                    <h3 class="font-bold text-sm text-blue-900 mt-2">點擊切換，學習如何完美疊加色彩：</h3>
                    <div class="mt-3 text-xs text-slate-600 bg-white/70 p-3 rounded border">
                        💡 <strong>建議心法：</strong> 先用水彩鋪出大面積柔和底色，等待乾燥後，再用彩色鉛筆或麥克筆勾勒邊緣與陰影，作品層次感會非常豐富喔！
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 分頁切換
        function switchTab(tab) {
            document.getElementById('content-healing').classList.add('hidden');
            document.getElementById('content-skills').classList.add('hidden');
            document.getElementById('tab-healing').className = 'px-5 py-4 font-bold text-sm text-slate-500 hover:text-slate-800';
            document.getElementById('tab-skills').className = 'px-5 py-4 font-bold text-sm text-slate-500 hover:text-slate-800';
            
            if(tab === 'healing') {
                document.getElementById('content-healing').classList.remove('hidden');
                document.getElementById('tab-healing').className = 'px-5 py-4 font-bold text-sm border-b-4 border-violet-600 text-violet-600';
            } else {
                document.getElementById('content-skills').classList.remove('hidden');
                document.getElementById('tab-skills').className = 'px-5 py-4 font-bold text-sm border-b-4 border-purple-600 text-purple-600';
                drawSphere();
            }
        }

        // 心情畫布
        const canvas = document.getElementById('healingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.strokeStyle = document.getElementById('brushColor').value;
            ctx.lineWidth = document.getElementById('brushSize').value;
            ctx.lineCap = 'round';
            ctx.stroke();
        });
        window.addEventListener('mouseup', () => isDrawing = false);
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // 呼吸冥想
        let breathInterval;
        let isBreathing = false;
        function toggleBreath() {
            const ball = document.getElementById('breathBall');
            const text = document.getElementById('breathText');
            const btn = document.getElementById('breathBtn');
            
            if(isBreathing) {
                clearInterval(breathInterval);
                ball.style.transform = 'scale(1)';
                ball.innerText = '等待中';
                text.innerText = '點擊下方按鈕開始練習';
                btn.className = 'w-full py-3 px-4 rounded-xl font-bold text-sm bg-emerald-600 text-white shadow-md';
                btn.innerText = '🎵 開始深呼吸放鬆';
                isBreathing = false;
            } else {
                isBreathing = true;
                btn.className = 'w-full py-3 px-4 rounded-xl font-bold text-sm bg-red-500 text-white shadow-md';
                btn.innerText = '⏹ 停止練習';
                let state = 0;
                breathInterval = setInterval(() => {
                    if(state === 0) {
                        ball.style.transform = 'scale(1.3)';
                        ball.innerText = '吸氣...';
                        text.innerText = '吸入平靜與滿滿的靈感';
                        state = 1;
                    } else {
                        ball.style.transform = 'scale(1)';
                        ball.innerText = '吐氣...';
                        text.innerText = '吐出所有的壓力和煩惱';
                        state = 0;
                    }
                }, 4000);
            }
        }

        // 3D立體球
        function drawSphere() {
            const sCanvas = document.getElementById('sphereCanvas');
            if(!sCanvas) return;
            const sCtx = sCanvas.getContext('2d');
            const lx = document.getElementById('lightX').value;
            
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            
            // 繪製桌面
            sCtx.fillStyle = '#E5E7EB';
            sCtx.fillRect(0, 160, 300, 140);
            
            // 陰影
            sCtx.save();
            sCtx.translate(150, 155);
            sCtx.scale(2, 0.4);
            let shadowGrad = sCtx.createRadialGradient(0,0, 0, (150-lx)*0.5, 0, 50);
            shadowGrad.addColorStop(0, 'rgba(0,0,0,0.4)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
            sCtx.fillStyle = shadowGrad;
            sCtx.beginPath(); sCtx.arc((150-lx)*0.5, 0, 60, 0, Math.PI*2); sCtx.fill();
            sCtx.restore();
            
            // 球體
            let radialGrad = sCtx.createRadialGradient(lx, 90, 5, 150, 110, 50);
            radialGrad.addColorStop(0, '#FFFFFF');
            radialGrad.addColorStop(0.3, '#E2E8F0');
            radialGrad.addColorStop(0.8, '#475569');
            radialGrad.addColorStop(1, '#0F172A');
            sCtx.fillStyle = radialGrad;
            sCtx.beginPath(); sCtx.arc(150, 110, 50, 0, Math.PI*2); sCtx.fill();
        }
    </script>
</body>
</html>
